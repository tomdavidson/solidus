# .github/workflows/pr.yml
name: PR

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, closed]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: ${{ github.event.action != 'closed' }}

jobs:
  validate-title:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .moon/workspace.yml
      - uses: ./.github/actions/validate-pr-title
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  ci:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: [0, 1]
    steps:
      - uses: ./.github/actions/setup
        with:
          cache-cargo: "true"
          cache-pnpm: "true"

      - uses: ./.github/actions/moon-ci
        with:
          job-index: ${{ matrix.index }}
          job-total: 2
          access-token: ${{ secrets.GITHUB_TOKEN }}
          matrix-json: ${{ toJSON(matrix) }}

  security:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: ./.github/actions/setup
        with:
          cache-cargo: "true"
          cache-pnpm: "true"

      - uses: ./.github/actions/moon-run
        with:
          task: ":rust-security :npm-security :python-security :go-security :gitleaks"
          affected: "remote"

  codeql:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: rust,javascript,python,go
      - uses: github/codeql-action/analyze@v3

  review-teardown:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      actions: write
    steps:
      - uses: ./.github/actions/raa-teardown
        with:
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
