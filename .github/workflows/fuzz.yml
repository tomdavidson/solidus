# .github/workflows/fuzz.yml
name: Fuzz

on:
  workflow_dispatch:

jobs:
  fuzz:
    name: Fuzz Parser
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup
        with:
          cache-cargo: "true"

      - uses: ./.github/actions/moon-run
        with:
          task: "parser:fuzz"

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: |
            parser/hfuzz_workspace/
