# .github/workflows/review.yml
name: Review

on:
  workflow_dispatch:
    inputs:
      pr-number:
        description: "PR number to build review artifacts for"
        required: true

permissions:
  deployments: write
  actions: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.inputs.pr-number }}/head
          fetch-depth: 0

      - uses: ./.github/actions/setup
        with:
          cache-cargo: "true"
          cache-pnpm: "true"

      - uses: ./.github/actions/raa-open
        id: raa
        with:
          pr-number: ${{ github.event.inputs.pr-number }}
          type: "artifacts"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build riff snapshot
        run: goreleaser release --config riff-cli/.goreleaser.yaml --snapshot --skip=publish

      - name: Build SDK snapshots
        run: |
          moon run slash-rust:build
          moon run slash-javascript:build
          moon run slash-web:build
          moon run slash-python:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: review-pr-${{ github.event.inputs.pr-number }}
          path: |
            riff-cli/dist/**
            slash-rust/target/**
            slash-javascript/dist/**
            slash-web/dist/**
            slash-python/dist/**

      - uses: ./.github/actions/raa-close
        if: always()
        with:
          pr-number: ${{ github.event.inputs.pr-number }}
          deployment-id: ${{ steps.raa.outputs.deployment-id }}
          status: ${{ job.status == 'success' && 'success' || 'failure' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
