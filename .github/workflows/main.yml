# .github/workflows/main.yml
name: Main

on:
  push:
    branches: [main]

concurrency:
  group: main-${{ github.sha }}

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: [0, 1]
    steps:
      - uses: ./.github/actions/setup
        with:
          cache-cargo: "true"
          cache-pnpm: "true"

      - uses: ./.github/actions/moon-ci
        with:
          job-index: ${{ matrix.index }}
          job-total: 2
          access-token: ${{ secrets.GITHUB_TOKEN }}
          matrix-json: ${{ toJSON(matrix) }}

  security:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: ./.github/actions/setup
        with:
          cache-cargo: "true"
          cache-pnpm: "true"

      - uses: ./.github/actions/moon-run
        with:
          task: ":rust-security :npm-security :python-security :go-security :gitleaks"

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: rust,javascript,python,go
      - uses: github/codeql-action/analyze@v3

  release-please:
    needs: [ci, security, codeql]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          command: manifest
          token: ${{ secrets.GITHUB_TOKEN }}
