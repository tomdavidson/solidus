# .github/workflows/publish-to-registry.yml
#
# Reusable workflow for publishing a project to its registry.
# Called by thin per-project publish-*.yml workflows.
#
# Usage:
#   jobs:
#     publish:
#       uses: ./.github/workflows/publish-to-registry.yml
#       with:
#         tag-prefix: "slash-javascript-v"
#         moon-task: "slash-javascript:publish"
#         cache-cargo: true
#         needs-oidc: true
#       secrets: inherit

name: Publish to Registry (reusable)

on:
  workflow_call:
    inputs:
      tag-prefix:
        required: true
        type: string
        description: "Tag prefix to match (e.g., 'slash-javascript-v')"
      moon-task:
        required: true
        type: string
        description: "Moon task to run (e.g., 'slash-javascript:publish')"
      cache-cargo:
        required: false
        type: boolean
        default: false
      cache-pnpm:
        required: false
        type: boolean
        default: false
      needs-oidc:
        required: false
        type: boolean
        default: false
        description: "Request id-token permission for OIDC trusted publishing"

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, inputs.tag-prefix)
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: write
      packages: write
      id-token: ${{ inputs.needs-oidc && 'write' || 'none' }}

    steps:
      - uses: ./.github/actions/setup
        with:
          cache-cargo: ${{ inputs.cache-cargo && 'true' || 'false' }}
          cache-pnpm: ${{ inputs.cache-pnpm && 'true' || 'false' }}

      - uses: ./.github/actions/moon-run
        with:
          task: ${{ inputs.moon-task }}
