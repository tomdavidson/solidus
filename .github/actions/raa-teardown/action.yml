# .github/actions/raa-teardown/action.yml
#
# Review Apps & Artifacts - Teardown
#
# Usage (in pr.yml on close):
#   - uses: ./.github/actions/raa-teardown
#     with:
#       pr-number: ${{ github.event.pull_request.number }}
#       github-token: ${{ secrets.GITHUB_TOKEN }}
#
# No checkout required. Pure API calls.
# Reads teardown metadata from deployment payloads.

name: "RAA Teardown"
description: "Deactivate deployments, delete environment, clean up artifacts"

inputs:
  pr-number:
    required: true
    description: "PR number"
  github-token:
    required: true
    description: "GITHUB_TOKEN"

runs:
  using: composite
  steps:
    - name: Teardown deployments and environment
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const envName = `review-pr-${{ inputs.pr-number }}`;
          const owner = context.repo.owner;
          const repo = context.repo.repo;

          // List all deployments for this environment
          const deployments = await github.rest.repos.listDeployments({
            owner, repo, environment: envName,
          });

          for (const dep of deployments.data) {
            // Read payload for any app-specific teardown info
            let payload = {};
            try {
              payload = JSON.parse(dep.payload || '{}');
            } catch (e) {
              core.warning(`Could not parse deployment payload: ${e.message}`);
            }

            // Log teardown metadata for debugging
            if (payload.teardown && Object.keys(payload.teardown).length > 0) {
              core.info(`Deployment ${dep.id} teardown metadata: ${JSON.stringify(payload.teardown)}`);
              // Future: use payload.teardown to call provider APIs
              // e.g., delete Cloudflare preview, destroy k8s namespace, etc.
            }

            // Mark deployment inactive
            await github.rest.repos.createDeploymentStatus({
              owner, repo,
              deployment_id: dep.id,
              state: 'inactive',
            });

            // Delete deployment
            await github.rest.repos.deleteDeployment({
              owner, repo,
              deployment_id: dep.id,
            });
            core.info(`Deleted deployment ${dep.id}`);
          }

          // Delete the environment
          try {
            await github.rest.repos.deleteAnEnvironment({
              owner, repo,
              environment_name: envName,
            });
            core.info(`Deleted environment ${envName}`);
          } catch (e) {
            core.warning(`Could not delete environment ${envName}: ${e.message}`);
          }

    - name: Delete workflow artifacts
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const artifactName = `review-pr-${{ inputs.pr-number }}`;
          const owner = context.repo.owner;
          const repo = context.repo.repo;

          const artifacts = await github.rest.actions.listArtifactsForRepo({
            owner, repo,
          });
          for (const art of artifacts.data.artifacts) {
            if (art.name === artifactName && !art.expired) {
              await github.rest.actions.deleteArtifact({
                owner, repo,
                artifact_id: art.id,
              });
              core.info(`Deleted artifact ${art.name} (${art.id})`);
            }
          }
