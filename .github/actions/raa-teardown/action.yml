name: Review App Teardown
description: Deactivate deployment and clean up review environment

inputs:
  pr-number:
    description: PR number
    required: true
  github-token:
    description: GitHub token for deployments API
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ inputs.pr-number }}
      run: |
        ENV_NAME="review-pr-${PR_NUMBER}"

        # Mark all deployments inactive
        DEPLOYMENT_IDS=$(gh api "repos/${{ github.repository }}/deployments?environment=${ENV_NAME}" \
          --jq '.[].id')

        for id in $DEPLOYMENT_IDS; do
          gh api "repos/${{ github.repository }}/deployments/${id}/statuses" \
            -f state=inactive -f description="PR closed"
        done

        # Delete pre-release assets if they exist
        RELEASE_TAG="review-pr-${PR_NUMBER}"
        gh release delete "$RELEASE_TAG" --yes --cleanup-tag 2>/dev/null || true

        # Remove the environment
        gh api -X DELETE "repos/${{ github.repository }}/environments/${ENV_NAME}" 2>/dev/null || true
