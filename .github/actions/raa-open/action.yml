# .github/actions/raa-open/action.yml
#
# Review Apps & Artifacts - Open
#
# Usage:
#   - uses: ./.github/actions/raa-open
#     id: raa
#     with:
#       pr-number: "42"
#       type: "artifacts"
#       github-token: ${{ secrets.GITHUB_TOKEN }}
#
# Usage (deployable app with teardown metadata):
#   - uses: ./.github/actions/raa-open
#     id: raa
#     with:
#       pr-number: "42"
#       type: "app"
#       teardown-metadata: '{"provider":"cloudflare","project_id":"xyz"}'
#       github-token: ${{ secrets.GITHUB_TOKEN }}
#
# Outputs:
#   deployment-id: ID of the created deployment
#   environment: Name of the environment (review-pr-42)

name: "RAA Open"
description: "Create review deployment and environment"

inputs:
  pr-number:
    required: true
    description: "PR number"
  type:
    required: false
    default: "artifacts"
    description: "'artifacts' or 'app'"
  teardown-metadata:
    required: false
    default: "{}"
    description: "JSON metadata stored in deployment payload, read by raa-teardown"
  github-token:
    required: true
    description: "GITHUB_TOKEN"

outputs:
  deployment-id:
    description: "Deployment ID"
    value: ${{ steps.deploy.outputs.deployment-id }}
  environment:
    description: "Environment name"
    value: ${{ steps.deploy.outputs.environment }}

runs:
  using: composite
  steps:
    - name: Create deployment
      id: deploy
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const envName = `review-pr-${{ inputs.pr-number }}`;
          const payload = {
            type: '${{ inputs.type }}',
            pr_number: '${{ inputs.pr-number }}',
            artifact_name: `review-pr-${{ inputs.pr-number }}`,
            teardown: ${{ inputs.teardown-metadata }},
          };
          const deployment = await github.rest.repos.createDeployment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: context.sha,
            environment: envName,
            auto_merge: false,
            required_contexts: [],
            description: `Review for PR #${{ inputs.pr-number }}`,
            payload: JSON.stringify(payload),
          });
          await github.rest.repos.createDeploymentStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            deployment_id: deployment.data.id,
            state: 'in_progress',
            description: 'Building review artifacts...',
          });
          core.setOutput('deployment-id', deployment.data.id);
          core.setOutput('environment', envName);
