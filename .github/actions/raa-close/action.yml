# .github/actions/raa-close/action.yml
#
# Review Apps & Artifacts - Close
#
# Usage (success):
#   - uses: ./.github/actions/raa-close
#     if: always()
#     with:
#       pr-number: "42"
#       deployment-id: ${{ steps.raa.outputs.deployment-id }}
#       status: ${{ job.status == 'success' && 'success' || 'failure' }}
#       github-token: ${{ secrets.GITHUB_TOKEN }}
#
# Usage (app with preview URL):
#   - uses: ./.github/actions/raa-close
#     with:
#       pr-number: "42"
#       deployment-id: ${{ steps.raa.outputs.deployment-id }}
#       status: success
#       environment-url: "https://preview-42.example.com"
#       github-token: ${{ secrets.GITHUB_TOKEN }}

name: "RAA Close"
description: "Finalize review deployment status"

inputs:
  pr-number:
    required: true
    description: "PR number"
  deployment-id:
    required: true
    description: "Deployment ID from raa-open"
  status:
    required: true
    description: "'success' or 'failure'"
  environment-url:
    required: false
    default: ""
    description: "URL for deployed app (shown in GitHub Deployments UI)"
  github-token:
    required: true
    description: "GITHUB_TOKEN"

runs:
  using: composite
  steps:
    - name: Update deployment status
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const opts = {
            owner: context.repo.owner,
            repo: context.repo.repo,
            deployment_id: ${{ inputs.deployment-id }},
            state: '${{ inputs.status }}',
          };
          const url = '${{ inputs.environment-url }}';
          if (url) {
            opts.environment_url = url;
          } else {
            opts.environment_url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          }
          await github.rest.repos.createDeploymentStatus(opts);
