name: Moon Setup
description: Checkout, install toolchains, restore caches, setup Moon

inputs:
  fetch-depth:
    description: Git fetch depth
    default: "0"
  cache:
    description: Enable dependency caching
    default: "true"
  rust:
    description: Install Rust toolchain
    default: "true"
  bun:
    description: Install Bun runtime
    default: "true"
  go:
    description: Install Go toolchain
    default: "false"
  python:
    description: Install Python toolchain
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: ${{ inputs.fetch-depth }}

    - uses: moonrepo/setup-toolchain@v1
      with:
        auto-install: true

    - if: inputs.rust == 'true'
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown,wasm32-wasip2

    - if: inputs.go == 'true'
      uses: actions/setup-go@v5
      with:
        go-version-file: go.work

    - if: inputs.python == 'true'
      uses: actions/setup-python@v5
      with:
        python-version-file: .python-version

    - if: inputs.cache == 'true' && inputs.rust == 'true'
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
        restore-keys: cargo-${{ runner.os }}-

    - if: inputs.cache == 'true' && inputs.bun == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
        restore-keys: bun-${{ runner.os }}-

    - if: inputs.cache == 'true'
      uses: actions/cache@v4
      with:
        path: .moon/cache
        key: moon-${{ runner.os }}-${{ github.sha }}
        restore-keys: moon-${{ runner.os }}-
