name: "Slasher Setup"
description: "Checkout, setup Moon/proto (lazy install), restore project caches"

inputs:
  fetch-depth:
    default: "0"
  cache-cargo:
    default: "false"
  cache-pnpm:
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: ${{ inputs.fetch-depth }}

    - uses: moonrepo/setup-toolchain@v0
      with:
        auto-install: true
        # proto cache is handled internally by this action

    - uses: actions/cache@v4
      with:
        path: .moon/cache
        key: moon-${{ runner.os }}-${{ hashFiles('.moon/workspace.yml', '.moon/tasks/*.yml', '.moon/toolchains.yml') }}
        restore-keys: |
          moon-${{ runner.os }}-

    - uses: actions/cache@v4
      if: inputs.cache-cargo == 'true'
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          cargo-${{ runner.os }}-

    - uses: actions/cache@v4
      if: inputs.cache-pnpm == 'true'
      with:
        path: ~/.local/share/pnpm/store
        key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-${{ runner.os }}-
