# https://moonrepo.dev/docs/config/toolchain
$schema: "https://moonrepo.dev/schemas/toolchain.json"

rust:
  version: "^1.94.0"
  components:
    - "rustfmt"
    - "clippy"
    - "llvm-tools"
  targets:
    - "wasm32-unknown-unknown"
    - "wasm32-wasip1"
  bins:
    - "cargo-nextest"
    - "cargo-component"
    - "wasm-pack"
    - "cargo-audit"
    - "cargo-deny"

javascript:
  packageManager: "pnpm"

node:
  version: "^22.22.1"

pnpm:
  version: "^10.32.1"

bun:
  version: "^1.3.10"

proto:
  version: '0.55.4'