# engine/fuzz/moon.yml
$schema: "https://moonrepo.dev/schemas/project.json"
id: "engine-fuzz"
language: "rust"
tags: ["fuzz"]

dependsOn:
  - "engine-fuzz-common"
  - "engine"

project: 
  metadata:
    regressions-path: "regressions"
    corpus-path: "corpus"

workspace:
  inheritedTasks:
    include: []

# engine/fuzz/moon.yml

tasks:
  # ---------------------------------------------------------
  # High-Level Meta Tasks
  # ---------------------------------------------------------
  
  fuzz:
    command: noop
    deps:
      - ~:libfuzz-structured
      - ~:libfuzz-unstructured
    options:
      runInCI: true

  fuzz-ci:
    command: noop
    deps:
      - ~:fuzz-saturate
      - ~:fuzz-gate
    options:
      runDepsInParallel: false

  fuzz-saturate:
    command: noop
    deps:
      - ~:fuzz-unstructured-saturate
      - ~:fuzz-structured-saturate

  fuzz-triage:
    script: |
      bash fuzz-manage.sh triage parse_document_unstructured
      bash fuzz-manage.sh triage parse_document_structured
    options:
      cache: false

  fuzz-gate:
    script: |
      shopt -s nullglob
      summaries=(artifacts/*/crash-summary.txt)
      if [ ${#summaries[@]} -eq 0 ]; then
        echo "No new crashes across all targets."
        exit 0
      fi
      for f in "${summaries[@]}"; do
        cat "$f"
        echo ""
      done
      echo "Triage with: moon run engine-fuzz:fuzz-triage"
      exit 1
    options:
      cache: false

  # ---------------------------------------------------------
  # Saturation Tasks (Run fuzzers and compact)
  # ---------------------------------------------------------

  fuzz-structured-saturate:
    script: bash fuzz-manage.sh compact parse_document_structured
    deps:
      - ~:libfuzz-structured-saturate
      - ~:libafl-structured-saturate

  fuzz-unstructured-saturate:
    script: bash fuzz-manage.sh compact parse_document_unstructured
    deps:
      - ~:libfuzz-unstructured-saturate
      - ~:libafl-unstructured-saturate

  # ---------------------------------------------------------
  # Individual Saturation Executions
  #
  # Defaults: FUZZ_MAXTIME=14400 (4h), FUZZ_JOBS=2
  # CI overrides via env: FUZZ_MAXTIME=18000 FUZZ_JOBS=4
  # Local override: FUZZ_MAXTIME=3600 FUZZ_JOBS=2 moon run ...
  # ---------------------------------------------------------

  libfuzz-structured-saturate:
    command: bash fuzz-run.sh parse_document_structured
    env:
      FUZZ_MAXTIME: "14400"
      FUZZ_JOBS: "2"
    options:
      cache: false

  libafl-structured-saturate:
    command: bash fuzz-run.sh parse_document_structured
    env:
      FUZZ_MAXTIME: "14400"
      FUZZ_JOBS: "2"
      FUZZ_FEATURES: "--no-default-features --features libafl"
    options:
      cache: false

  libfuzz-unstructured-saturate:
    command: bash fuzz-run.sh parse_document_unstructured
    env:
      FUZZ_MAXTIME: "14400"
      FUZZ_JOBS: "2"
    options:
      cache: false

  libafl-unstructured-saturate:
    command: bash fuzz-run.sh parse_document_unstructured
    env:
      FUZZ_MAXTIME: "14400"
      FUZZ_JOBS: "2"
      FUZZ_FEATURES: "--no-default-features --features libafl"
    options:
      cache: false



  # ---------------------------------------------------------
  # CI Integration Tasks (Fast PR check using existing corpus)
  #
  # LibAFL does not support corpus-only replay (-runs=0). Its value
  # is in long-running saturation, not quick CI checks. Minimized
  # crashes are already covered by the cargo test regression suite.
  # ---------------------------------------------------------

  libfuzz-structured:
    command: bash fuzz-run.sh parse_document_structured --replay
    env:
      FUZZ_MAXTIME: "10"
      FUZZ_JOBS: "2"
    options:
      cache: false

  libfuzz-unstructured:
    command: bash fuzz-run.sh parse_document_unstructured --replay
    env:
      FUZZ_MAXTIME: "10"
      FUZZ_JOBS: "2"
    options:
      cache: false



  # ---------------------------------------------------------
  # Corpus Sync Tasks (Shared corpus via orphan branch)
  #
  # The `corpus` orphan branch stores the shared fuzz corpus
  # using one subdirectory per project (e.g. engine-fuzz/).
  # A git worktree mounted at //.corpus/ provides local access
  # without branch switching.
  #   `git worktree add .corpus corpus`
  #
  # CI seeds from the branch before fuzzing and pushes updated
  # corpus back after each run. Local sessions do the same via
  # these tasks.
  #
  # Typical local session:
  #
  #   moon run engine-fuzz:fuzz-corpus-pull    # seed from CI
  #   moon run engine-fuzz:fuzz-saturate       # fuzz for 24h
  #   moon run engine-fuzz:fuzz-corpus-push    # triage, compact, push
  #
  # The push task triages any new crashes, compacts the corpus
  # to remove redundant inputs, then syncs the result to the
  # orphan branch. A pull before push ensures CI discoveries
  # made during the session are preserved.
  # ---------------------------------------------------------

  fuzz-corpus-pull:
    script: |
      REPO_ROOT="$(git rev-parse --show-toplevel)"
      WORKTREE="${REPO_ROOT}/.corpus"
      CORPUS="${REPO_ROOT}/engine/fuzz/corpus"

      cd "$WORKTREE" && git pull --ff-only origin corpus && cd -
      mkdir -p "$CORPUS"
      rsync -a "${WORKTREE}/engine/fuzz/corpus/" "${CORPUS}/"
      echo "Pulled $(find "${WORKTREE}/engine/fuzz/corpus" -type f 2>/dev/null | wc -l) inputs"
    options:
      cache: false

  fuzz-corpus-push:
    script: |
      REPO_ROOT="$(git rev-parse --show-toplevel)"
      WORKTREE="${REPO_ROOT}/.corpus"
      CORPUS="${REPO_ROOT}/engine/fuzz/corpus"

      bash fuzz-manage.sh compact parse_document_structured
      bash fuzz-manage.sh compact parse_document_unstructured
      cd "$WORKTREE" && git pull --ff-only origin corpus && cd -
      mkdir -p "${WORKTREE}/engine/fuzz/corpus"
      rsync -a --delete "${CORPUS}/" "${WORKTREE}/engine/fuzz/corpus/"
      cd "$WORKTREE"
      git add -A
      if ! git diff --cached --quiet; then
        COUNT=$(git diff --cached --numstat | wc -l)
        git commit -m "corpus: engine/fuzz/corpus ${COUNT} files $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        git push origin corpus
      fi
    options:
      cache: false